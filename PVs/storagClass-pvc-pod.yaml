apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: alpha-storage
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alpha-pvc
spec:
  storageClassName: alpha-storage
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: alpha-pod
spec:
  containers:
  - name: alpha-container
    image: nginx
    volumeMounts:
    - mountPath: "/usr/share/nginx/html"
      name: alpha-volume
  volumes:
  - name: alpha-volume
    persistentVolumeClaim:
      claimName: alpha-pvc
  tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"