apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: automated-workloads
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: "https://github.com/argoproj/argo-cd.git"
        revision: "HEAD"
        directories:
          - path: apps/*
  template:
    metadata:
      name: "{{path.basename}}"
    spec:
      project: default
      source:
        repoURL: "https://github.com/argoproj/argo-cd.git"
        targetRevision: "HEAD"
        path: "{{path}}"
      destination:
        server: "https://kubernetes.default.svc"
        namespace: "{{path.basename}}-ns"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
