apiVersion: v1
kind: Secret
metadata:
  name: local-cluster-labels
  namespace: argocd
  labels:
    # Required for ArgoCD to recognize it as a cluster
    argocd.argoproj.io/secret-type: cluster
    # Your custom labels for ApplicationSets
    environment: staging
    cluster-type: management
type: Opaque
stringData:
  name: in-cluster
  server: https://kubernetes.default.svc
  # Config is empty for the local cluster as it uses the default service account
  config: "{}"

