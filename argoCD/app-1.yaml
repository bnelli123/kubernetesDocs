apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-bootstrap-app
  namespace: argocd
spec:
  project: app-project-1
  source:
    repoURL: "https://github.com/argoproj/argo-cd.git"
    targetRevision: HEAD
    path: "apps/*"
    directory:
      recurse: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
